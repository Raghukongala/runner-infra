name: CI-CD to ECS via ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: 957948932374
  ECR_REPOSITORY: raghu-node-app
  ECS_CLUSTER: raghu-cluster
  ECS_SERVICE: raghu-service
  PATH: /usr/local/bin:/usr/bin:/bin   # ✅ FIXED PATH

jobs:

  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔍 Debug AWS CLI (important for troubleshooting)
      - name: Verify AWS CLI
        run: |
          which aws
          aws --version
          aws sts get-caller-identity

      # 🔐 Login to Amazon ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # 🐳 Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.run_number }} .

      # 🏷 Tag Image
      - name: Tag Docker Image
        run: |
          docker tag $ECR_REPOSITORY:${{ github.run_number }} \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.run_number }}

      # 📤 Push to ECR
      - name: Push to ECR
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.run_number }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Verify AWS CLI
        run: |
          which aws
          aws sts get-caller-identity

      # 🚀 Deploy to ECS
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Success Message
        run: echo "🚀 Deployment completed successfully to ECS"
