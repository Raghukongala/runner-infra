name: Terraform CI/CD (Production ECS Infra)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  TF_DIR: .

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:

      # =========================
      # 1. Checkout Code
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # 2. Configure AWS Credentials
      # (IMPORTANT - FIX YOUR ISSUE HERE)
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================
      # 3. Verify AWS Identity
      # =========================
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # =========================
      # 4. Install Terraform
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      # =========================
      # 5. Terraform Init
      # =========================
      - name: Terraform Init
        run: terraform init -reconfigure

      # =========================
      # 6. Import existing resources (SAFE)
      # =========================
      - name: Import Existing Resources
        run: |
          terraform state list | grep ecr || terraform import aws_ecr_repository.repo raghu-node-app || true
          terraform state list | grep iam || terraform import aws_iam_role.ecs_task_role ecsTaskExecutionRole || true

      # =========================
      # 7. Validate
      # =========================
      - name: Terraform Validate
        run: terraform validate

      # =========================
      # 8. Plan
      # =========================
      - name: Terraform Plan
        run: terraform plan

      # =========================
      # 9. Apply
      # =========================
      - name: Terraform Apply
        run: terraform apply -auto-approve

      # =========================
      # 10. Show state
      # =========================
      - name: Show Terraform State
        run: terraform state list
