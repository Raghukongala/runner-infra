name: CI-CD to ECS via ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  AWS_ACCOUNT_ID: 957948932374
  ECR_REPOSITORY: raghu-node-app
  ECS_CLUSTER: raghu-cluster
  ECS_SERVICE: raghu-service

jobs:

  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 AWS AUTH USING GITHUB SECRETS
      - name: Configure AWS Credentials
        run: |
          export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          export AWS_DEFAULT_REGION=$AWS_REGION
          aws sts get-caller-identity

      # 🔧 Fix AWS CLI PATH (important for your runner)
      - name: Fix PATH
        run: export PATH=$PATH:/usr/local/bin

      # 🔐 Login to ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # 🐳 Build Image
      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:${{ github.run_number }} .

      # 🏷 Tag Image
      - name: Tag Image
        run: |
          docker tag $ECR_REPOSITORY:${{ github.run_number }} \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.run_number }}

      # 📤 Push Image
      - name: Push to ECR
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ github.run_number }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Success
        run: echo "🚀 Deployment completed successfully"
