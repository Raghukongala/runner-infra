name: Terraform CI/CD (Production ECS Infra)

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  TF_DIR: .

jobs:
  terraform:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:

      # =========================
      # 1. Checkout Code
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # 2. Verify AWS Access
      # =========================
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # =========================
      # 3. Install Terraform
      # =========================
      - name: Install Terraform
        run: |
          sudo apt update -y
          sudo apt install -y unzip wget

          wget https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip
          unzip terraform_1.6.6_linux_amd64.zip
          sudo mv terraform /usr/local/bin/

          terraform -version

      # =========================
      # 4. Terraform Init (with backend lock)
      # =========================
      - name: Terraform Init
        run: terraform init -reconfigure

      # =========================
      # 5. Import existing resources (SAFE MODE)
      # =========================
      - name: Import Existing Resources (Ignore errors if already imported)
        run: |
          terraform state list | grep ecr || terraform import aws_ecr_repository.repo raghu-node-app || true
          terraform state list | grep iam || terraform import aws_iam_role.ecs_task_role ecsTaskExecutionRole || true

      # =========================
      # 6. Validate
      # =========================
      - name: Terraform Validate
        run: terraform validate

      # =========================
      # 7. Plan
      # =========================
      - name: Terraform Plan
        run: terraform plan

      # =========================
      # 8. Apply (SAFE + IDPOTENT)
      # =========================
      - name: Terraform Apply
        run: terraform apply -auto-approve

      # =========================
      # 9. Show final state
      # =========================
      - name: Show Terraform State
        run: terraform state list
