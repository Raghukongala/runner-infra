name: Terraform CI/CD (ECS Production Safe)

on:
  push:
    branches:
      - main
  pull_request:

env:
  AWS_REGION: ap-south-1
  TF_DIR: .

jobs:

  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:

      # =========================
      # 1. Checkout Code
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # 2. Configure AWS Credentials
      # =========================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================
      # 3. Setup Terraform
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =========================
      # 4. Terraform INIT (SAFE + STATE HANDLING)
      # =========================
      - name: Terraform Init (Safe State Sync)
        run: |
          terraform init -reconfigure -input=false

      # Optional recovery step (only if state mismatch happens)
      - name: Terraform Migrate State (if needed)
        run: |
          terraform init -migrate-state -input=false || true

      # =========================
      # 5. Format Check
      # =========================
      - name: Terraform Format Check
        run: terraform fmt -check

      # =========================
      # 6. Validate
      # =========================
      - name: Terraform Validate
        run: terraform validate

      # =========================
      # 7. Import Missing Resources (SAFE IDENTITY CHECK)
      # =========================
      - name: Safe Import Existing Resources
        run: |

          echo "Checking existing state before import..."

          terraform state list | grep aws_ecr_repository.repo || \
          terraform import aws_ecr_repository.repo raghu-node-app || true

          terraform state list | grep aws_ecs_cluster.cluster || \
          terraform import aws_ecs_cluster.cluster raghu-cluster || true

          terraform state list | grep aws_iam_role.ecs_task_role || \
          terraform import aws_iam_role.ecs_task_role ecsTaskExecutionRole || true

          echo "Import step completed safely."

      # =========================
      # 8. PLAN (LOCK SAFE)
      # =========================
      - name: Terraform Plan
        run: terraform plan -lock-timeout=5m -out=tfplan

      # =========================
      # 9. APPLY (ONLY MAIN BRANCH)
      # =========================
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
