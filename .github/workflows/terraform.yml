name: Terraform CI/CD (Production Safe ECS Infra)

on:
  push:
    branches:
      - main
  pull_request:

env:
  AWS_REGION: ap-south-1
  TF_WORKING_DIR: .

jobs:

  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:

      # =========================
      # 1. Checkout Code
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # 2. AWS Credentials
      # =========================
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================
      # 3. Setup Terraform
      # =========================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # =========================
      # 4. Terraform Init (S3 + Lock)
      # =========================
      - name: Terraform Init
        run: terraform init -reconfigure

      # =========================
      # 5. SAFE IMPORT (ONLY IF NOT IN STATE)
      # =========================
      - name: Import Existing AWS Resources Safely
        run: |

          echo "Checking state and importing only missing resources..."

          # ECR
          terraform state list | grep aws_ecr_repository.repo || \
          terraform import aws_ecr_repository.repo raghu-node-app || true

          # ECS Cluster
          terraform state list | grep aws_ecs_cluster.cluster || \
          terraform import aws_ecs_cluster.cluster raghu-cluster || true

          # IAM Role
          terraform state list | grep aws_iam_role.ecs_task_role || \
          terraform import aws_iam_role.ecs_task_role ecsTaskExecutionRole || true

          # Security Group (example ID required)
          # terraform import aws_security_group.ecs_sg sg-xxxx || true

          echo "Import step completed safely."

      # =========================
      # 6. Format + Validate
      # =========================
      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      # =========================
      # 7. PLAN (STATE LOCK SAFE)
      # =========================
      - name: Terraform Plan
        run: terraform plan -lock-timeout=5m -out=tfplan

      # =========================
      # 8. APPLY (ONLY MAIN)
      # =========================
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
